<!DOCTYPE html>
<html>
<head>
<title>EVEZ Analytics</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.card{background:#111;padding:20px;border-radius:8px;}
.num{font-size:2em;color:#0f0;}
</style>
</head>
<body>
<h1 style="color:#0f0;">EVEZ Analytics</h1>
<div class="grid">
<div class="card"><div class="num">100%</div>Uptime</div>
<div class="card"><div class="num">0</div>Errors</div>
<div class="card"><div class="num">0</div>Events</div>
</div>
</body>
</html>
