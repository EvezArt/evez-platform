plugins {
    id 'com.android.application'
}

android {
    namespace 'com.evez666.platform'
    compileSdk 36

    defaultConfig {
        applicationId "com.evez666.platform"
        minSdk 28
        targetSdk 36
        versionCode 200
        versionName "0.2.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
